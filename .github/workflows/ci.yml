name: CI

# Fast checks on every PR and push to main: fmt, clippy, test, and a
# frontend build. Release bundling lives in release.yml — this keeps
# PR iteration tight without waiting on a .dmg.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        # Tauri's src-tauri is a workspace member; its build.rs pulls
        # in webkit2gtk + friends even for `cargo check` / `clippy`.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Stub frontend dist
        # src-tauri points at ../frontend/dist in tauri.conf.json.
        # cargo check reads the config; missing dist fails the build.
        # A placeholder keeps clippy/test from requiring a real Vite
        # build on the Rust leg.
        run: |
          mkdir -p crates/desktop/frontend/dist
          echo "<!doctype html><title>ci stub</title>" \
            > crates/desktop/frontend/dist/index.html

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: crates/desktop/frontend/package-lock.json
      - name: npm ci + build
        working-directory: crates/desktop/frontend
        run: |
          npm ci
          npm run build
