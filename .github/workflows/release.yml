name: Release desktop

# Builds the Tauri desktop bundle on macOS (universal) and Linux
# (AppImage + .deb), plus the CLI binary for the same hosts, and
# attaches the artifacts to a GitHub release.
#
# Triggers:
#   - push of a `v*` tag (e.g. `v0.1.0`) — cut a versioned release
#   - workflow_dispatch — build against the current main without a
#     tag, artifacts land on a rolling `latest` pre-release
#
# PR runs hit the `build` job only (no release) so we keep PRs
# reviewable without publishing half-baked artifacts. Main pushes
# don't auto-release either — a tag is the intent signal.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal .dmg (tauri-action lipoes both archs).
          # `bundle-flags` is for the Tauri bundle only; the CLI
          # `cargo build` doesn't understand `universal-apple-darwin`
          # and uses the host arch (arm64 on macos-14 runner).
          - host: macos-14
            bundle-flags: "--target universal-apple-darwin"
            cli-flags: ""
            cli-out: "target/release/bastion"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            label: "macos-arm64"
          - host: ubuntu-22.04
            bundle-flags: ""
            cli-flags: ""
            cli-out: "target/release/bastion"
            rust-targets: "x86_64-unknown-linux-gnu"
            label: "linux-x86_64"
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: crates/desktop/frontend/package-lock.json

      - name: Build frontend
        working-directory: crates/desktop/frontend
        run: |
          npm ci
          npm run build

      - name: Build CLI
        run: cargo build --release -p bastion-cli ${{ matrix.cli-flags }}

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/desktop/src-tauri
          args: ${{ matrix.bundle-flags }}
          # Don't auto-create a release from the action — we handle
          # artifact upload ourselves below so the CLI binary rides
          # along in the same release.

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/dist

          # CLI — host-arch binary at cli-out.
          cp "${{ matrix.cli-out }}" /tmp/dist/bastion-${{ matrix.label }}

          # Desktop bundle(s). Tauri paths depend on whether
          # bundle-flags carried a --target.
          shopt -s nullglob
          for f in \
            target/universal-apple-darwin/release/bundle/dmg/*.dmg \
            target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
            target/x86_64-apple-darwin/release/bundle/dmg/*.dmg \
            target/release/bundle/dmg/*.dmg \
            target/release/bundle/appimage/*.AppImage \
            target/release/bundle/deb/*.deb; do
            cp "$f" /tmp/dist/
          done

          ls -la /tmp/dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: /tmp/dist/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/dist
          merge-multiple: true

      - name: Resolve tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}"       >> "$GITHUB_OUTPUT"
            echo "prerelease="                        >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest"                         >> "$GITHUB_OUTPUT"
            echo "prerelease=--prerelease"            >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:        ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          cd /tmp/dist
          ls -la
          # Rolling `latest` re-creates each run; versioned v* tags
          # are immutable (the tag triggered us).
          if [ "$TAG" = "latest" ]; then
            gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          fi
          gh release create "$TAG" $PRERELEASE \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "Desktop + CLI build from ${GITHUB_SHA}" \
            ./*
