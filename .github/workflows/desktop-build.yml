name: desktop-build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    # Single Apple Silicon runner, cross-builds x86_64 from the same
    # job. GitHub's macos-13 (Intel) runner pool is effectively
    # unavailable (deprecated through 2026), so a matrix across the
    # two arches just strands the x86_64 cell in the queue. cargo +
    # clang on arm64 produce x86_64 Mach-O binaries natively; Tauri's
    # bundler + hdiutil + codesign all work cross-arch on macOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/desktop/src-tauri -> target

      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked

      - name: Frontend deps
        working-directory: crates/desktop
        run: npm ci

      - name: Build arm64 bundle
        working-directory: crates/desktop
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Build x64 bundle (cross-compile)
        working-directory: crates/desktop
        run: cargo tauri build --target x86_64-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p dist
          for arch_target in arm64:aarch64-apple-darwin x64:x86_64-apple-darwin; do
            label=${arch_target%%:*}
            tgt=${arch_target##*:}
            cp crates/desktop/src-tauri/target/$tgt/release/bundle/dmg/*.dmg \
              "dist/bastion-$label.dmg" 2>/dev/null || true
            (cd crates/desktop/src-tauri/target/$tgt/release/bundle/macos \
              && tar -czf "$GITHUB_WORKSPACE/dist/bastion-$label.app.tar.gz" *.app) \
              2>/dev/null || true
          done
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: bastion-desktop-macos
          path: dist/
          if-no-files-found: error

  release:
    needs: macos
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
